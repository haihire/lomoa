name: DB Migrate

# Manual trigger only: run migration SQL in EC2 lomoa-postgres container and optionally restart NestJS.
# Usage: gh workflow run db-migrate.yml -f sql_file=scripts/migrate-youtube-snapshots.sql [-f restart_nest=true]

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: "Repository-root SQL file path (e.g. scripts/migrate-youtube-snapshots.sql)"
        required: true
        default: "scripts/migrate-youtube-snapshots.sql"
      restart_nest:
        description: "Whether to restart the NestJS container after migration"
        required: false
        default: "true"

permissions:
  contents: read
  id-token: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run SQL migration on EC2 via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SQL_FILE: ${{ inputs.sql_file }}
          RESTART_NEST: ${{ inputs.restart_nest }}
        run: |
          set -e

          # Script to run on the remote EC2 host.
          # SQL 파일은 호스트(EC2)에 있으므로 -f(컨테이너 내부 경로) 대신 stdin으로 전달
          remote_script="cd /home/ubuntu/daloa \
            && git pull origin main \
            && test -f \"$SQL_FILE\" \
            && set -a && source .env && set +a \
            && docker exec -i lomoa-postgres psql -U \"\$DB_USER\" -d \"\$DB_NAME\" < \"$SQL_FILE\" \
            && echo MIGRATION_OK"

          if [ "$RESTART_NEST" = "true" ]; then
            remote_script="$remote_script && docker compose restart nest && echo NEST_RESTARTED"
          fi

          # Encode safely for JSON transport.
          encoded=$(printf '%s' "$remote_script" | base64 -w0)

          command_id=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --comment "db-migrate: $SQL_FILE" \
            --parameters "commands=[\"set -e\",\"sudo -u ubuntu -H bash -lc \\\"echo $encoded | base64 -d | bash\\\"\"]" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM CommandId: $command_id"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID"
          wait_exit=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json

          if [ "$wait_exit" -ne 0 ]; then
            exit "$wait_exit"
          fi
