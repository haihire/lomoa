name: Diagnose NestJS

# 수동 트리거: EC2 NestJS 컨테이너 상태·로그 확인
on:
  workflow_dispatch:
    inputs:
      tail:
        description: "로그 라인 수"
        required: false
        default: "100"

permissions:
  contents: read
  id-token: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get NestJS container status and logs
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TAIL: ${{ inputs.tail }}
        run: |
          command_id=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --comment "diag-nest" \
            --parameters "commands=[\"sudo -u ubuntu -H bash -lc 'cd /home/ubuntu/lomoa && echo === CONTAINER STATUS === && docker compose ps && echo === NEST LOGS === && docker compose logs --tail=$TAIL nest'\"]" \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json
