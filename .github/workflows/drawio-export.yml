name: Export Draw.io to SVG

on:
  push:
    branches: [main]
    paths:
      - "docs/architecture.drawio"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export architecture.drawio → SVG
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs
          format: svg
          transparent: false
          output: .
          remove-page-suffix: true

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/architecture.svg
          git diff --staged --quiet || git commit -m "chore: update architecture.svg"
          git push
