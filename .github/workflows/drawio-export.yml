name: Export Draw.io to SVG

on:
  push:
    branches: [main]
    paths:
      - "docs/architecture.drawio"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export architecture.drawio → SVG
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs
          format: svg
          transparent: false
          output: .
          remove-page-suffix: true

      - name: Create Pull Request with SVG
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update architecture.svg"
          title: "chore: update architecture.svg"
          body: "Auto-generated by drawio-export workflow."
          branch: chore/architecture-svg-update
          base: main
          add-paths: docs/architecture.svg
          delete-branch: true
