name: Main Post Merge

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'

permissions:
  contents: read
  id-token: write

jobs:
  prepare-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          NEXT_REVALIDATE_SECRET: ${{ secrets.NEXT_REVALIDATE_SECRET }}
        run: |
          remote_script="set -e
          cd /home/ubuntu/daloa
          git reset --hard HEAD
          git pull origin main
          grep -q '^NEXT_REVALIDATE_URL=' .env || echo 'NEXT_REVALIDATE_URL=https://www.daloa.kr/api/revalidate' >> .env
          sed -i '/^NEXT_REVALIDATE_SECRET=/d' .env
          echo 'NEXT_REVALIDATE_SECRET=${NEXT_REVALIDATE_SECRET}' >> .env
          cd server && npm run build && cd ..
          docker compose up -d --build nest"

          encoded=$(printf '%s' "$remote_script" | base64 -w0)

          command_id=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --comment "main-post-merge auto deploy" \
            --parameters "commands=[\"set -e\",\"sudo -u ubuntu -H bash -lc \\\"echo $encoded | base64 -d | bash\\\"\"]" \
            --query 'Command.CommandId' \
            --output text)

          # SSM waiter 기본값(100s)이 너무 짧으므로 직접 폴링 (최대 10분)
          wait_exit=1
          for i in $(seq 1 60); do
            status=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "[${i}/60] SSM status: $status"
            if [ "$status" = "Success" ]; then
              wait_exit=0; break
            elif [ "$status" = "Failed" ] || [ "$status" = "Cancelled" ] || [ "$status" = "TimedOut" ]; then
              wait_exit=1; break
            fi
            sleep 10
          done

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json

          if [ "$wait_exit" -ne 0 ]; then
            exit "$wait_exit"
          fi

      - name: Health check (optional)
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL secret is not set. Skip health check."
            exit 0
          fi
          curl -f "$HEALTHCHECK_URL"
