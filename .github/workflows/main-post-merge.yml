name: Main Post Merge

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
  workflow_dispatch:

# configure-aws-credentials@v5가 아직 Node 20 런타임이라 강제로 Node 24에서 실행 (2026-06-16 deprecation 대응)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  prepare-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx create --use
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --push \
            ./server

      - name: Deploy to EC2 via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          NEXT_REVALIDATE_SECRET: ${{ secrets.NEXT_REVALIDATE_SECRET }}
          DEPLOY_EVENT_TOKEN: ${{ secrets.DEPLOY_EVENT_TOKEN }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ECR_PASSWORD=$(aws ecr get-login-password --region ${AWS_REGION})

          remote_script="set -e
          cd /home/ubuntu/lomoa
          git reset --hard HEAD
          git pull origin main
          grep -q '^NEXT_REVALIDATE_URL=' .env || echo 'NEXT_REVALIDATE_URL=https://www.lomoa.kr/api/revalidate' >> .env
          sed -i '/^NEXT_REVALIDATE_SECRET=/d' .env
          echo 'NEXT_REVALIDATE_SECRET=${NEXT_REVALIDATE_SECRET}' >> .env
          sed -i '/^DEPLOY_EVENT_TOKEN=/d' .env
          echo 'DEPLOY_EVENT_TOKEN=${DEPLOY_EVENT_TOKEN}' >> .env
          sed -i '/^NEST_IMAGE=/d' .env
          echo 'NEST_IMAGE=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}' >> .env
          echo '${ECR_PASSWORD}' | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker compose --profile production up -d
          docker restart lomoa-nginx
          docker images '${ECR_REGISTRY}/${ECR_REPOSITORY}' --format '{{.Tag}} {{.ID}}' | grep -v '${IMAGE_TAG}' | awk '{print \$2}' | xargs -r docker rmi -f || true
          docker image prune -f"

          encoded=$(printf '%s' "$remote_script" | base64 -w0)

          command_id=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --comment "main-post-merge auto deploy" \
            --parameters "commands=[\"set -e\",\"sudo -u ubuntu -H bash -lc \\\"echo $encoded | base64 -d | bash\\\"\"]" \
            --query 'Command.CommandId' \
            --output text)

          # 최대 3분 폴링 (EC2는 pull+start만 하므로 충분)
          wait_exit=1
          for i in $(seq 1 36); do
            status=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "[${i}/36] SSM status: $status"
            if [ "$status" = "Success" ]; then
              wait_exit=0; break
            elif [ "$status" = "Failed" ] || [ "$status" = "Cancelled" ] || [ "$status" = "TimedOut" ]; then
              wait_exit=1; break
            fi
            sleep 5
          done

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json

          if [ "$wait_exit" -ne 0 ]; then
            exit "$wait_exit"
          fi

      - name: Health check (optional)
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL secret is not set. Skip health check."
            exit 0
          fi
          curl -f "$HEALTHCHECK_URL"

      # nest 배포 시점을 모니터링(container_events)에 기록. 실패해도 배포는 성공 처리.
      - name: Log deploy event (nest)
        if: success()
        env:
          DEPLOY_EVENT_TOKEN: ${{ secrets.DEPLOY_EVENT_TOKEN }}
        run: |
          if [ -z "$DEPLOY_EVENT_TOKEN" ]; then
            echo "DEPLOY_EVENT_TOKEN secret not set. Skip deploy log."
            exit 0
          fi
          curl -fsS -X POST https://api.lomoa.kr/api/webhooks/deploy \
            -H "Content-Type: application/json" \
            -H "x-deploy-token: $DEPLOY_EVENT_TOKEN" \
            -d "{\"service\":\"nest\",\"sha\":\"${{ github.sha }}\"}" \
            || echo "deploy log POST failed (non-fatal)"
