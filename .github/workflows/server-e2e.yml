name: Server E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: lost_ark
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptestpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: lost_ark
      DB_USER: root
      DB_PASS: testpass
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      GEMINI_API_KEY: ""
      YOUTUBE_API_KEY: ""
      LOSTARK_API_KEY: ""
      KAKAO_REST_API_KEY: ""
      KAKAO_REFRESH_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Seed test database
        run: |
          mysql -h 127.0.0.1 -u root -ptestpass lost_ark < scripts/init-db.sql

      - name: Run server E2E
        working-directory: server
        run: npm run test:e2e
