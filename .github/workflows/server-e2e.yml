name: Server E2E (Manual)

# Purpose:
# - Keep this as a manual fallback/regression reproducer.
# - PR automatic E2E runs are unified in .github/workflows/pr-ci.yml.

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lost_ark
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d lost_ark"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://testuser:testpass@127.0.0.1:5432/lost_ark
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      GEMINI_API_KEY: ""
      YOUTUBE_API_KEY: ""
      LOSTARK_API_KEY: ""
      KAKAO_REST_API_KEY: ""
      KAKAO_REFRESH_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Setup database schema
        working-directory: server
        run: npx prisma db push

      - name: Run server E2E
        working-directory: server
        run: npm run test:e2e
