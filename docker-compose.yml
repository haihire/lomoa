name: lomoa

services:
  postgres:
    image: postgres:16-alpine
    container_name: lomoa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lomoa-net

  redis:
    image: redis:7-alpine
    container_name: lomoa-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - lomoa-net

  nest:
    image: ${NEST_IMAGE:-lomoa-nest:dev}
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lomoa-nest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}?options=-c%20search_path%3Dlost_ark
      REDIS_HOST: redis
      SITE_FINDER_DIR: /site-finder
    volumes:
      - ./.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./site-finder:/site-finder
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lomoa-net

  nginx:
    profiles:
      - production
    image: nginx:alpine
    container_name: lomoa-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nest
    networks:
      - lomoa-net

volumes:
  postgres_data:
  redis_data:

networks:
  lomoa-net:
    driver: bridge
