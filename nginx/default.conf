# Nginx 버전 숨기기
server_tokens off;

# IP당 분당 120회 제한 (버스트 30회 허용)
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=120r/m;

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name api.daloa.kr;
    return 301 https://$host$request_uri;
}

# HTTPS: api.daloa.kr → NestJS
server {
    listen 443 ssl;
    server_name api.daloa.kr;
    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/api.daloa.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.daloa.kr/privkey.pem;

    # TLS 버전 제한 (1.2 이상만 허용)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/admin/sync/ {
        proxy_pass         http://nest:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=api_per_ip burst=30 nodelay;
        proxy_pass         http://nest:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
